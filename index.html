<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Маскина</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <a href="#"><img src="./img/xbox.png" alt="" /></a>
        <ul class="nav-list">
          <li>
            <a href="#">Games</a><img src="./img/down-arrow.png" alt="" />
          </li>
          <li>
            <a href="#">Consoles</a><img src="./img/down-arrow.png" alt="" />
          </li>
          <li><a href="#">Community</a></li>
          <input
            type="text"
            class="search-input"
            name="username"
            placeholder="Search"
          />
          <li>
            <a href="#"><img src="./img/user.png" alt="" /> My XBOX</a>
            <img src="./img/down-arrow.png" alt="" />
          </li>
        </ul>
      </div>
    </header>
    <main>
      <!-- Hero секция -->
      <section class="hero">
        <div class="container hero-container">
          <div class="hero-content">
            <h1 class="hero-title">Star Wars</h1>
            <h2 class="hero-subtitle">Battlefront II</h2>
            <div class="hero-buttons">
              <button class="btn btn-primary">Watch Trailer</button>
              <button class="btn btn-secondary">Explore Games</button>
            </div>
          </div>
        </div>
      </section>
      <!-- Highlights секция -->
      <section class="highlights">
        <div class="container">
          <h2 class="highlights-title">
            The best value in games and entertainment
          </h2>

          <div class="highlights-grid">
            <!-- Карточка 1 -->
            <div class="highlight-card">
              <img src="./img/2.png" alt="Games with Gold" class="card-image" />
              <h3 class="card-title">GAMES WITH GOLD</h3>
              <p class="card-desc">Free Games Every Month</p>
              <button class="card-btn">Learn More</button>
            </div>

            <!-- Карточка 2 -->
            <div class="highlight-card">
              <img src="./img/img.png" alt="XBOX One X" class="card-image" />
              <h3 class="card-title">XBOX ONE X</h3>
              <p class="card-desc">Faster Processing<br />Smoother Gameplay</p>
              <button class="card-btn">Learn More</button>
            </div>

            <!-- Карточка 3 -->
            <div class="highlight-card">
              <img
                src="./img/img.png"
                alt="Mixer Streaming"
                class="card-image"
              />
              <h3 class="card-title">MIXER STREAMING</h3>
              <p class="card-desc">
                The Next Generation<br />Of Life Game Streaming
              </p>
              <button class="card-btn">Learn More</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Маскина</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header container">
        <!-- Логотип -->
        <a href="index.html" class="logo-link">
          <img src="./img/logo.svg" alt="logo" class="logo-img" />
        </a>

        <!-- Навигация -->
        <nav class="nav">
          <a href="#">Games</a>
          <a href="#">Consoles</a>
          <a href="#">Community</a>
        </nav>

        <!-- Правая секция -->
        <div class="right-section">
          <!-- Поиск в виде формы -->
          <form action="" method="get" class="search-form">
            <input
              name="s"
              placeholder="Search"
              type="search"
              class="search-input"
            />
          </form>

          <!-- My XBOX -->
          <div class="my-xbox">
            <img src="./img/user.svg" alt="user" class="profile-icon" />
            <span>My XBOX</span>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
